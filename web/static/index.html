<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Hand Cricket AI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Bebas+Neue&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:       #0a0a0a;
      --bg2:      #111111;
      --bg3:      #1a1a1a;
      --border:   #2a2a2a;
      --green:    #00ff88;
      --green-dim:#00cc66;
      --red:      #ff4455;
      --amber:    #ffaa00;
      --text:     #e0e0e0;
      --muted:    #666;
      --font-mono: 'Share Tech Mono', monospace;
      --font-disp: 'Bebas Neue', sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-mono);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* scanline overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,0,0,0.15) 2px,
        rgba(0,0,0,0.15) 4px
      );
      pointer-events: none;
      z-index: 9999;
    }

    /* ── Layout ── */
    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 2rem 1.5rem;
    }

    header {
      text-align: center;
      margin-bottom: 3rem;
      border-bottom: 1px solid var(--border);
      padding-bottom: 1.5rem;
    }

    header h1 {
      font-family: var(--font-disp);
      font-size: clamp(2.5rem, 6vw, 4.5rem);
      letter-spacing: 6px;
      color: var(--green);
      text-shadow: 0 0 30px rgba(0,255,136,0.3);
    }

    header p {
      color: var(--muted);
      font-size: 0.75rem;
      letter-spacing: 3px;
      margin-top: 0.4rem;
    }

    /* ── Screens ── */
    .screen { display: none; }
    .screen.active { display: block; }

    /* ── Cards ── */
    .card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 1.5rem;
      margin-bottom: 1.5rem;
    }

    .card-title {
      font-family: var(--font-disp);
      letter-spacing: 3px;
      color: var(--green);
      font-size: 1.1rem;
      margin-bottom: 1rem;
      border-bottom: 1px solid var(--border);
      padding-bottom: 0.5rem;
    }

    /* ── Input ── */
    input[type="text"] {
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 3px;
      color: var(--text);
      font-family: var(--font-mono);
      font-size: 1rem;
      padding: 0.75rem 1rem;
      width: 100%;
      outline: none;
      transition: border-color 0.2s;
    }
    input[type="text"]:focus { border-color: var(--green); }

    /* ── Buttons ── */
    .btn {
      background: transparent;
      border: 1px solid var(--green);
      border-radius: 3px;
      color: var(--green);
      cursor: pointer;
      font-family: var(--font-mono);
      font-size: 0.9rem;
      letter-spacing: 2px;
      padding: 0.75rem 2rem;
      transition: all 0.15s;
      text-transform: uppercase;
    }
    .btn:hover {
      background: var(--green);
      color: var(--bg);
    }
    .btn:disabled {
      opacity: 0.3;
      cursor: not-allowed;
    }
    .btn-red {
      border-color: var(--red);
      color: var(--red);
    }
    .btn-red:hover {
      background: var(--red);
      color: var(--bg);
    }
    .btn-amber {
      border-color: var(--amber);
      color: var(--amber);
    }
    .btn-amber:hover {
      background: var(--amber);
      color: var(--bg);
    }

    /* ── Number grid ── */
    .number-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 0.75rem;
      margin: 1rem 0;
    }

    .num-btn {
      aspect-ratio: 1;
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--text);
      cursor: pointer;
      font-family: var(--font-disp);
      font-size: 2rem;
      letter-spacing: 2px;
      transition: all 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .num-btn:hover {
      border-color: var(--green);
      color: var(--green);
      background: rgba(0,255,136,0.05);
      transform: scale(1.05);
    }
    .num-btn:active { transform: scale(0.97); }
    .num-btn.selected {
      border-color: var(--green);
      background: rgba(0,255,136,0.15);
      color: var(--green);
    }
    .num-btn:disabled {
      opacity: 0.3;
      cursor: not-allowed;
      transform: none;
    }

    /* ── Scoreboard ── */
    .scoreboard {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
      margin-bottom: 1.5rem;
    }

    .score-box {
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 1rem;
      text-align: center;
    }

    .score-box.active-batter {
      border-color: var(--green);
      box-shadow: 0 0 15px rgba(0,255,136,0.1);
    }

    .score-name {
      font-size: 0.7rem;
      letter-spacing: 3px;
      color: var(--muted);
      margin-bottom: 0.3rem;
    }

    .score-runs {
      font-family: var(--font-disp);
      font-size: 3.5rem;
      line-height: 1;
      color: var(--green);
    }

    .score-label {
      font-size: 0.65rem;
      color: var(--muted);
      margin-top: 0.2rem;
    }

    /* ── Ball log ── */
    .ball-log {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
      max-height: 80px;
      overflow-y: auto;
    }

    .ball-chip {
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 3px;
      font-size: 0.7rem;
      padding: 0.2rem 0.5rem;
      letter-spacing: 1px;
    }
    .ball-chip.out {
      border-color: var(--red);
      color: var(--red);
    }
    .ball-chip.scored {
      border-color: var(--border);
      color: var(--text);
    }

    /* ── Reveal animation ── */
    .reveal-box {
      display: flex;
      gap: 1.5rem;
      justify-content: center;
      align-items: center;
      padding: 1.5rem;
      margin: 1rem 0;
    }

    .reveal-side {
      text-align: center;
      flex: 1;
    }

    .reveal-label {
      font-size: 0.65rem;
      letter-spacing: 3px;
      color: var(--muted);
      margin-bottom: 0.5rem;
    }

    .reveal-num {
      font-family: var(--font-disp);
      font-size: 5rem;
      line-height: 1;
      transition: all 0.3s;
    }

    .reveal-num.human { color: var(--green); }
    .reveal-num.ai    { color: var(--amber); }
    .reveal-num.out   { color: var(--red) !important; }

    .reveal-vs {
      font-family: var(--font-disp);
      font-size: 1.5rem;
      color: var(--muted);
      letter-spacing: 3px;
    }

    .result-banner {
      text-align: center;
      padding: 1rem;
      border-radius: 3px;
      font-family: var(--font-disp);
      font-size: 1.8rem;
      letter-spacing: 4px;
      margin: 1rem 0;
      display: none;
    }
    .result-banner.out-banner {
      background: rgba(255,68,85,0.1);
      border: 1px solid var(--red);
      color: var(--red);
    }
    .result-banner.safe-banner {
      background: rgba(0,255,136,0.05);
      border: 1px solid var(--green);
      color: var(--green);
    }

    /* ── Status line ── */
    .status-line {
      font-size: 0.75rem;
      letter-spacing: 2px;
      color: var(--muted);
      text-align: center;
      min-height: 1.2rem;
      margin: 0.5rem 0;
    }
    .status-line.highlight { color: var(--amber); }

    /* ── Insights ── */
    .insights-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
      margin-bottom: 1.5rem;
    }

    .insight-stat {
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 1rem;
    }

    .insight-label {
      font-size: 0.65rem;
      letter-spacing: 3px;
      color: var(--muted);
      margin-bottom: 0.3rem;
    }

    .insight-value {
      font-family: var(--font-disp);
      font-size: 2rem;
      color: var(--green);
    }

    .insight-value.amber { color: var(--amber); }
    .insight-value.red   { color: var(--red); }

    .dist-bar-row {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin: 0.3rem 0;
      font-size: 0.75rem;
    }

    .dist-num { width: 20px; color: var(--muted); text-align: right; }

    .dist-bar-bg {
      flex: 1;
      background: var(--bg3);
      border-radius: 2px;
      height: 14px;
      overflow: hidden;
    }

    .dist-bar-fill {
      height: 100%;
      background: var(--green);
      border-radius: 2px;
      transition: width 0.6s ease;
    }

    .dist-pct { width: 45px; color: var(--muted); font-size: 0.65rem; }

    /* ── Profile strip ── */
    .profile-strip {
      display: flex;
      gap: 2rem;
      flex-wrap: wrap;
      margin-bottom: 1.5rem;
    }

    .profile-stat { text-align: center; }
    .profile-stat .val {
      font-family: var(--font-disp);
      font-size: 1.8rem;
      color: var(--green);
    }
    .profile-stat .lbl {
      font-size: 0.6rem;
      letter-spacing: 2px;
      color: var(--muted);
    }

    /* ── Toss ── */
    .toss-choice {
      display: flex;
      gap: 1rem;
      justify-content: center;
      flex-wrap: wrap;
    }

    /* ── Winner screen ── */
    .winner-display {
      text-align: center;
      padding: 3rem 1rem;
    }
    .winner-display .trophy { font-size: 4rem; margin-bottom: 1rem; }
    .winner-display h2 {
      font-family: var(--font-disp);
      font-size: 3rem;
      letter-spacing: 6px;
      color: var(--green);
    }
    .winner-display p {
      color: var(--muted);
      font-size: 0.75rem;
      letter-spacing: 3px;
      margin-top: 0.5rem;
    }

    /* ── Pulse animation ── */
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.4; }
    }
    .pulse { animation: pulse 1.5s ease-in-out infinite; }

    /* ── Flicker ── */
    @keyframes flicker {
      0%, 100% { opacity: 1; }
      92%       { opacity: 1; }
      93%       { opacity: 0.6; }
      94%       { opacity: 1; }
    }
    header h1 { animation: flicker 8s infinite; }

    /* ── Responsive ── */
    @media (max-width: 500px) {
      .number-grid { grid-template-columns: repeat(5, 1fr); gap: 0.4rem; }
      .num-btn { font-size: 1.5rem; }
      .scoreboard { grid-template-columns: 1fr 1fr; }
      .insights-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
<div class="container">
  <header>
    <h1>HAND CRICKET</h1>
    <p>// PATTERN RECOGNITION ENGINE ACTIVE //</p>
  </header>

  <!-- ── SCREEN 1: Login ── -->
  <div id="screen-login" class="screen active">
    <div class="card">
      <div class="card-title">IDENTIFY</div>
      <input type="text" id="player-name-input" placeholder="enter your name..." maxlength="20"/>
      <br/><br/>
      <button class="btn" onclick="loadPlayer()">ENTER SYSTEM</button>
    </div>
  </div>

  <!-- ── SCREEN 2: Lobby ── -->
  <div id="screen-lobby" class="screen">
    <div class="card">
      <div class="card-title">PLAYER PROFILE</div>
      <div class="profile-strip" id="profile-strip"></div>
      <div id="pred-warning" style="display:none; color:var(--amber); font-size:0.75rem; letter-spacing:2px; margin-bottom:1rem;"></div>
      <button class="btn" onclick="startToss()">START MATCH</button>
    </div>
  </div>

  <!-- ── SCREEN 3: Toss ── -->
  <div id="screen-toss" class="screen">
    <div class="card">
      <div class="card-title">TOSS</div>
      <p style="color:var(--muted); font-size:0.8rem; margin-bottom:1rem; letter-spacing:2px;">CALL ODD OR EVEN</p>
      <div class="toss-choice">
        <button class="btn" onclick="tossPick('odd')">ODD</button>
        <button class="btn" onclick="tossPick('even')">EVEN</button>
      </div>
    </div>
  </div>

  <!-- ── SCREEN 4: Toss number ── -->
  <div id="screen-toss-number" class="screen">
    <div class="card">
      <div class="card-title">TOSS — REVEAL YOUR NUMBER</div>
      <p class="status-line" id="toss-call-display"></p>
      <div class="number-grid" id="toss-number-grid"></div>
    </div>
  </div>

  <!-- ── SCREEN 5: Toss result + bat/bowl ── -->
  <div id="screen-toss-result" class="screen">
    <div class="card">
      <div class="card-title">TOSS RESULT</div>
      <div id="toss-result-display" style="margin-bottom:1.5rem; line-height:2; font-size:0.85rem;"></div>
      <div id="bat-bowl-choice"></div>
    </div>
  </div>

  <!-- ── SCREEN 6: Game ── -->
  <div id="screen-game" class="screen">
    <div class="scoreboard" id="scoreboard"></div>

    <div class="card" id="game-card">
      <div class="card-title" id="innings-label">INNINGS 1</div>
      <div class="status-line" id="game-status"></div>

      <!-- Reveal area -->
      <div class="reveal-box" id="reveal-box" style="display:none;">
        <div class="reveal-side">
          <div class="reveal-label" id="reveal-label-left">YOU</div>
          <div class="reveal-num human" id="reveal-num-left">—</div>
        </div>
        <div class="reveal-vs">VS</div>
        <div class="reveal-side">
          <div class="reveal-label" id="reveal-label-right">AI</div>
          <div class="reveal-num ai" id="reveal-num-right">—</div>
        </div>
      </div>

      <div class="result-banner" id="result-banner"></div>

      <!-- Number input grid -->
      <div id="number-grid-wrapper">
        <p style="font-size:0.7rem; letter-spacing:3px; color:var(--muted); margin-bottom:0.75rem;" id="pick-label">PICK YOUR NUMBER</p>
        <div class="number-grid" id="game-number-grid"></div>
      </div>

      <!-- Ball log -->
      <div style="margin-top:1.5rem;">
        <p style="font-size:0.65rem; letter-spacing:3px; color:var(--muted); margin-bottom:0.5rem;">BALL LOG</p>
        <div class="ball-log" id="ball-log"></div>
      </div>
    </div>
  </div>

  <!-- ── SCREEN 7: Innings break ── -->
  <div id="screen-break" class="screen">
    <div class="card" style="text-align:center;">
      <div class="card-title">INNINGS COMPLETE</div>
      <div id="break-message" style="margin: 1.5rem 0; line-height:2; font-size:0.85rem;"></div>
      <button class="btn" onclick="startInnings2()">BEGIN CHASE</button>
    </div>
  </div>

  <!-- ── SCREEN 8: Match over ── -->
  <div id="screen-over" class="screen">
    <div class="winner-display" id="winner-display"></div>

    <div class="card" id="insights-card">
      <div class="card-title">YOUR PATTERN ANALYSIS</div>
      <div class="insights-grid" id="insights-grid"></div>
      <div style="margin-top:1rem;">
        <p style="font-size:0.65rem; letter-spacing:3px; color:var(--muted); margin-bottom:0.75rem;">NUMBER DISTRIBUTION</p>
        <div id="dist-bars"></div>
      </div>
    </div>

    <div style="display:flex; gap:1rem; flex-wrap:wrap;">
      <button class="btn" onclick="playAgain()">PLAY AGAIN</button>
      <button class="btn btn-amber" onclick="goLobby()">BACK TO LOBBY</button>
    </div>
  </div>

</div>

<script src="/static/game.js"></script>
</body>
</html>
